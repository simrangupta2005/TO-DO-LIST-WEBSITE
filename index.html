<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> To Do List </title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <h2><i class="fa-solid fa-list-check"></i> TASKS</h2>

    <div class="input-container">
        <input type="text" id="taskInput" placeholder="Add a new task...">
        <button onclick="addTask()" title="Add Task"><i class="fa-solid fa-plus"></i></button>
    </div>

    <ul id="taskList"></ul>
</div>

<script>
    
    document.getElementById("taskInput").addEventListener("keypress", function(event) {
        if (event.key === "Enter") {
            addTask();
        }
    });

    function addTask() {
        var taskInput = document.getElementById("taskInput");
        var taskText = taskInput.value.trim();

        if (taskText === "") {
            taskInput.parentElement.style.animation = "shake 0.4s ease";
            setTimeout(() => {
                taskInput.parentElement.style.animation = "";
            }, 400);
            return;
        }

        var li = document.createElement("li");

        var span = document.createElement("span");
        span.textContent = taskText;
        span.className = "task-text";
        span.onclick = function() {
           
            span.classList.toggle("completed");
            if (span.classList.contains("completed")) {
                li.style.borderLeftColor = "#adb5bd";
            } else {
                li.style.borderLeftColor = "#667eea";
            }
        };

        var deleteBtn = document.createElement("button");
        deleteBtn.innerHTML = '<i class="fa-solid fa-trash"></i>';
        deleteBtn.className = "delete-btn";
        deleteBtn.title = "Delete Task";
        deleteBtn.onclick = function() {
            
            li.style.animation = "slideOut 0.3s ease forwards";
            setTimeout(() => {
                li.remove();
            }, 300);
        };

        li.appendChild(span);
        li.appendChild(deleteBtn);

        document.getElementById("taskList").prepend(li);

        taskInput.value = "";
        taskInput.focus();
    }
</script>

</body>
</html>
